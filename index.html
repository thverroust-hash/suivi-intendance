  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}

<body>
<div id="root"></div>

<!-- Polyfill du stockage : remplace window.storage (API artifacts) par localStorage -->
<script>
  window.storage = {
    get: async (key, shared) => {
      const v = localStorage.getItem(key);
      return v !== null ? { key, value: v, shared: !!shared } : null;
    },
    set: async (key, value, shared) => {
      localStorage.setItem(key, value);
      return { key, value, shared: !!shared };
    },
    delete: async (key, shared) => {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: !!shared };
    },
    list: async (prefix, shared) => {
      const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: !!shared };
    }
  };
</script>

<script type="text/babel" data-presets="react" src="app.jsx"></script>
<script type="text/babel" data-presets="react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
</script>
</body>
